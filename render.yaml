services:
  - type: web
    name: invoice-backend
    env: node
    rootDir: invoice-backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    disk:
      name: invoice-upload-disk
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: MONGO_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: invoice-frontend
    env: static
    rootDir: invoice-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
